{% extends "base.html" %}
{% block title %}Analytics - Job Agent{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<div class="page-header animate-in delay-1">
    <div style="display: flex; align-items: center; gap: 0.75rem;">
        <a href="/" class="btn btn-ghost btn-sm" title="Back to Overview"><i class="bi bi-arrow-left"></i></a>
        <h2>
            <span class="page-icon"><i class="bi bi-graph-up"></i></span>
            Analytics
        </h2>
    </div>
</div>

<div class="chart-grid">
    <div class="card animate-in delay-2">
        <div class="card-header">
            <h5>Score Distribution</h5>
        </div>
        <div class="card-body">
            <canvas id="scoreChart" height="260"></canvas>
        </div>
    </div>
    <div class="card animate-in delay-3">
        <div class="card-header">
            <h5>Activity Timeline</h5>
        </div>
        <div class="card-body">
            <canvas id="timelineChart" height="260"></canvas>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Detect theme for chart colors
function getThemeColors() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    return {
        textColor: isDark ? '#636b80' : '#9ca3af',
        gridColor: isDark ? 'rgba(42,46,63,0.5)' : 'rgba(229,231,235,0.8)',
        green: isDark ? '#4ade80' : '#22c55e',
        greenBg: isDark ? 'rgba(74,222,128,0.08)' : 'rgba(34,197,94,0.08)',
        blue: isDark ? '#60a5fa' : '#3b82f6',
        blueBg: isDark ? 'rgba(96,165,250,0.08)' : 'rgba(59,130,246,0.08)',
        amber: isDark ? '#fbbf24' : '#f59e0b',
        red: isDark ? '#f87171' : '#ef4444',
    };
}

async function loadCharts() {
    var C = getThemeColors();

    Chart.defaults.color = C.textColor;
    Chart.defaults.borderColor = C.gridColor;
    Chart.defaults.font.family = "'JetBrains Mono', monospace";
    Chart.defaults.font.size = 11;

    var scoreResp = await fetch('/analytics/data/scores');
    var scoreData = await scoreResp.json();

    new Chart(document.getElementById('scoreChart'), {
        type: 'bar',
        data: {
            labels: Object.keys(scoreData.distribution),
            datasets: [{
                label: 'Jobs',
                data: Object.values(scoreData.distribution),
                backgroundColor: Object.keys(scoreData.distribution).map(function(k) {
                    var val = parseFloat(k);
                    if (val >= 0.9) return 'rgba(34, 197, 94, 0.55)';
                    if (val >= 0.7) return 'rgba(245, 158, 11, 0.55)';
                    return 'rgba(239, 68, 68, 0.45)';
                }),
                borderColor: Object.keys(scoreData.distribution).map(function(k) {
                    var val = parseFloat(k);
                    if (val >= 0.9) return C.green;
                    if (val >= 0.7) return C.amber;
                    return C.red;
                }),
                borderWidth: 1,
                borderRadius: 6,
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: C.gridColor } },
                x: { grid: { display: false } }
            }
        }
    });

    var timeResp = await fetch('/analytics/data/timeline');
    var timeData = await timeResp.json();

    var labels = [].concat(
        timeData.applications.map(function(d) { return d.date; }),
        timeData.discoveries.map(function(d) { return d.date; })
    ).filter(function(v, i, a) { return a.indexOf(v) === i; }).sort();

    var appMap = {};
    timeData.applications.forEach(function(d) { appMap[d.date] = d.count; });
    var discMap = {};
    timeData.discoveries.forEach(function(d) { discMap[d.date] = d.count; });

    new Chart(document.getElementById('timelineChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Discovered',
                    data: labels.map(function(l) { return discMap[l] || 0; }),
                    borderColor: C.blue,
                    backgroundColor: C.blueBg,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: C.blue,
                    borderWidth: 2,
                },
                {
                    label: 'Applied',
                    data: labels.map(function(l) { return appMap[l] || 0; }),
                    borderColor: C.green,
                    backgroundColor: C.greenBg,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: C.green,
                    borderWidth: 2,
                }
            ]
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { labels: { usePointStyle: true, pointStyle: 'circle', padding: 16 } }
            },
            scales: {
                y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: C.gridColor } },
                x: { grid: { display: false } }
            }
        }
    });
}

loadCharts();
</script>
{% endblock %}
