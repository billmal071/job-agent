<div id="resume-preview-panel">
    <div class="card">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
            <h5><i class="bi bi-pencil-square"></i> Edit Tailored Resume</h5>
            <div class="d-flex gap-2">
                <button class="btn btn-success btn-sm"
                        hx-post="/jobs/{{ job.id }}/save-resume"
                        hx-include="#resume-form"
                        hx-target="#resume-save-result"
                        hx-swap="innerHTML">
                    <i class="bi bi-file-earmark-pdf"></i> Save & Generate PDF
                </button>
            </div>
        </div>
        <div class="card-body">
            <form id="resume-form">
                <textarea name="resume_md"
                          class="form-control"
                          rows="28"
                          style="font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.5; background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 6px; padding: 1rem; resize: vertical;">{{ resume_md }}</textarea>
            </form>
            <div id="resume-save-result" style="margin-top: 0.75rem;"></div>
        </div>
    </div>
</div>
